; XIAO ESP32-C6 garage remote firmware.
; The ESP32-C6 needs Arduino core 3.x, which the official PlatformIO
; espressif32 platform does not ship — we use the pioarduino fork instead.
[env:seeed_xiao_esp32c6]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.30-2/platform-espressif32.zip
board = seeed_xiao_esp32c6
framework = arduino
monitor_speed = 115200
lib_deps =
    h2zero/NimBLE-Arduino@^2.3.0
; Pin the connection/bond limits explicitly (these are the NimBLE 2.x
; defaults; MAX_BONDS/MAX_CONNECTIONS in main.cpp must stay <= them) and
; drop the unused client role to save flash.
build_flags =
    -D MYNEWT_VAL_BLE_MAX_CONNECTIONS=3
    -D MYNEWT_VAL_BLE_STORE_MAX_BONDS=3
    -D MYNEWT_VAL_BLE_ROLE_CENTRAL=0
